name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'JsonPathPlus.Evaluator/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore JsonPathPlus.Evaluator/JsonPathPlus.Evaluator.csproj

      - name: Publish Blazor WASM
        run: dotnet publish JsonPathPlus.Evaluator/JsonPathPlus.Evaluator.csproj -c Release -o publish

      - name: Rewrite base href
        uses: SteveSandersonMS/ghaction-rewrite-base-href@4583ede549773dabe1410c42e703d54cf52859ff # v1.1.0
        with:
          base_href: /jsonpath-plus-online-evaluator/
          html_path: publish/wwwroot/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'publish/wwwroot'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
