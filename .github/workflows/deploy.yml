name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'JsonPathPlus.Evaluator/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Restore dependencies
        run: dotnet restore JsonPathPlus.Evaluator/JsonPathPlus.Evaluator.csproj

      - name: Publish Blazor WASM
        run: dotnet publish JsonPathPlus.Evaluator/JsonPathPlus.Evaluator.csproj -c Release -o publish

      - name: Rewrite base href
        uses: SteveSandersonMS/ghaction-rewrite-base-href@4583ede549773dabe1410c42e703d54cf52859ff # v1.1.0
        with:
          base_href: /jsonpath-plus-online-evaluator/
          html_path: publish/wwwroot/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          force_orphan: true
